name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build website
        run: pnpm --filter @gentorial/website exec vite build --base=/gentorial/

      - name: Build documentation
        env:
          GENTORIAL_DOCS_BASE: /gentorial/docs/
          GENTORIAL_WEBSITE_URL: /gentorial/
        run: pnpm --filter @gentorial/docs build

      - name: Add documentation to website artifact
        run: |
          mkdir -p apps/website/dist/docs
          cp -R apps/docs/docs/.vitepress/dist/. apps/website/dist/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
